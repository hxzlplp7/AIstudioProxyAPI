services:
  ai-studio-proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-studio-proxy-container
    mem_limit: ${DOCKER_MEMORY_LIMIT:-0}
    memswap_limit: ${DOCKER_MEMSWAP_LIMIT:-0}
    ports:
      - "${HOST_FASTAPI_PORT:-2048}:2048"
      - "${HOST_STREAM_PORT:-3120}:3120"
    volumes:
      # Mount authentication profiles for persistence
      - ../auth_profiles:/app/auth_profiles
      # Mount .env for configuration
      # Recommendation: Create a docker/.env from .env.docker
      - ../docker/.env:/app/.env:ro
      # Optional: Mount logs for persistence
      # - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      # Internal ports (should match the Dockerfile EXPOSE and launch args)
      - DEFAULT_FASTAPI_PORT=2048
      - STREAM_PORT=3120
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:2048/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
